events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server host.docker.internal:8090;
    }

    upstream ui_backend {
        server host.docker.internal:3000;
    }

    server {
        listen 8080;
        server_name _;

        # API requests → port 8090
        location /api/ {
            proxy_pass http://api_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Short URL redirects → port 8090
        location /r/ {
            proxy_pass http://api_backend/r/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else → UI on port 3000 (POST → redirect to /dashboard)
        location / {
            if ($request_method = POST) {
                return 302 $scheme://$host/dashboard;
            }
            proxy_pass http://ui_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
