version: '3.8'

services:
  # MiniURL API Application
  miniurl-api:
    image: ${DOCKER_IMAGE:-gallantsuri1/miniurl-api:v1.0.0}
    container_name: miniurl-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Server Configuration
      SERVER_PORT: 8080

      # Database Configuration - REQUIRED (MySQL runs in its own container)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # ⚠️ JWT Configuration - REQUIRED: Set APP_JWT_SECRET in .env
      # Application will FAIL TO START without a valid JWT secret
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: 3600000

      # SMTP Configuration (Email)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # Application Configuration
      APP_BASE_URL: ${APP_BASE_URL:-https://api.example.com}
      APP_UI_BASE_URL: ${APP_UI_BASE_URL:-https://example.com}
      APP_OTP_EXPIRY_MINUTES: 15

      # CORS Configuration - REQUIRED for frontend access
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://ui.example.com}

      # Spring Profile
      SPRING_PROFILES_ACTIVE: prod

      # JVM Options
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    networks:
      - miniurl-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  miniurl-network:
    external: true
