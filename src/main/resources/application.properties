# Server Configuration
server.port=8080

# Note: Database configuration is in application.yml
# MySQL is configured there with HikariCP connection pooling

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration - Set via environment variable APP_JWT_SECRET or profile-specific config
# app.jwt.secret=${APP_JWT_SECRET:}
# app.jwt.expiration-ms=3600000

# SMTP Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application Configuration
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.otp.expiry-minutes=10
app.name=${APP_NAME:MiniURL}

# Logging Configuration
# See logback-spring.xml for detailed logging configuration
# Log levels are configured in logback-spring.xml
