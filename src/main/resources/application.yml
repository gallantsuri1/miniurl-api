# MiniURL Application Configuration
server:
  port: 8080

spring:
  application:
    name: MiniURL API
  # Default profile - use 'prod' for production deployments
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  # Mail Configuration
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# JWT Configuration
app:
  jwt:
    secret: ${APP_JWT_SECRET:MiniURLSecretKeyForJWTTokenGeneration2024VeryLongSecretKeyForHS512Algorithm}
    expiration-ms: 3600000

  # Base URL for email links and redirects
  # Priority: 1) APP_BASE_URL env var, 2) Default http://localhost:3000
  base-url: ${APP_BASE_URL:http://localhost:3000}
  otp:
    expiry-minutes: 10
  name: ${APP_NAME:MiniURL}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,bulkheads
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Resilience4j Configuration - Circuit Breaker, Bulkhead, and Retry patterns
resilience4j:
  # Circuit Breaker Configuration
  circuitbreaker:
    configs:
      default:
        # Number of failures before opening circuit
        failureRateThreshold: 50
        # Wait duration in open state before transitioning to half-open
        waitDurationInOpenState: 30000
        # Number of calls in half-open state before transitioning
        permittedNumberOfCallsInHalfOpenState: 10
        # Minimum number of calls before calculating failure rate
        minimumNumberOfCalls: 10
        # Sliding window size
        slidingWindowSize: 100
        # Sliding window type: COUNT_BASED or TIME_BASED
        slidingWindowType: TIME_BASED
        # Time unit for wait duration
        waitDurationInOpenStateInMilliseconds: 30000
        # Automatically transition from OPEN to HALF_OPEN
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # Record exceptions as failures
        recordExceptions:
          - java.sql.SQLException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.net.UnknownHostException
          - jakarta.mail.MessagingException
          - org.springframework.dao.DataAccessException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
    instances:
      database:
        baseConfig: default
        failureRateThreshold: 60
        waitDurationInOpenState: 20000
        minimumNumberOfCalls: 5
      emailService:
        baseConfig: default
        failureRateThreshold: 50
        waitDurationInOpenState: 60000
        minimumNumberOfCalls: 3
      urlValidation:
        baseConfig: default
        failureRateThreshold: 70
        waitDurationInOpenState: 15000
        minimumNumberOfCalls: 5

  # Bulkhead Configuration - Separate thread pools for isolation
  bulkhead:
    configs:
      default:
        # Maximum number of concurrent calls
        maxConcurrentCalls: 100
        # Wait time when bulkhead is full
        maxWaitDuration: 10000
        # Enable thread pool bulkhead
        threadPoolBulkhead:
          enabled: true
          # Core thread pool size
          coreThreadPoolSize: 10
          # Maximum thread pool size
          maxThreadPoolSize: 50
          # Keep alive time for threads
          keepAliveDuration: 10000
          # Queue capacity
          queueCapacity: 100
    instances:
      # URL creation operations - separate pool
      urlCreation:
        maxConcurrentCalls: 50
        maxWaitDuration: 5000
      # Email operations - separate pool to prevent blocking
      email:
        maxConcurrentCalls: 20
        maxWaitDuration: 10000
      # Admin operations - separate pool
      admin:
        maxConcurrentCalls: 30
        maxWaitDuration: 5000
      # Redirect operations - high throughput pool
      redirect:
        maxConcurrentCalls: 200
        maxWaitDuration: 2000

  # Retry Configuration
  retry:
    configs:
      default:
        # Maximum number of retry attempts
        maxAttempts: 3
        # Wait duration between retries
        waitDuration: 1000
        # Enable exponential backoff
        enableExponentialBackoff: true
        # Exponential backoff multiplier
        exponentialBackoffMultiplier: 2
        # Maximum wait duration
        maxWaitDuration: 10000
        # Retry on specific exceptions
        retryExceptions:
          - java.sql.SQLException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.dao.TransientDataAccessResourceException
          - jakarta.mail.MessagingException
        # Do not retry on these exceptions
        ignoreExceptions:
          - java.lang.InterruptedException
          - java.net.UnknownHostException
    instances:
      database:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500
      emailService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 2000
      urlValidation:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 500

  # Thread Pool Configuration for Bulkhead
  thread-pool-bulkhead:
    configs:
      default:
        coreThreadPoolSize: 10
        maxThreadPoolSize: 50
        keepAliveDuration: 10000
        queueCapacity: 100

# Logging Configuration
# Note: Profile-specific logging configured in application-dev.yml and application-prod.yml
logging:
  level:
    com.miniurl: INFO
    org.springframework.security: WARN
    org.thymeleaf: WARN
    org.springframework.mail: WARN
    org.hibernate: WARN

# Springdoc OpenAPI Configuration
# Note: Enabled/disabled via profile-specific configuration (application-dev.yml, application-prod.yml)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
