# MyURL Application Configuration - Development Profile
# This profile enables Swagger/OpenAPI documentation and development-friendly settings

spring:
  config:
    activate:
      on-profile: dev

  # MySQL Database Configuration (can be overridden by environment variables for CI)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/miniurldb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpass}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: MyURL API-HikariPool

  # JPA Configuration for Development
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Thymeleaf - Disable caching for hot reload
  thymeleaf:
    cache: false

# Swagger/OpenAPI - ENABLED for development
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true

# Logging - More verbose for development
logging:
  level:
    com.miniurl: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.mail: DEBUG
    # SQL logging - set to DEBUG to see SQL queries, WARN to hide
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.orm.jdbc.extract: WARN

# Application Settings
app:
  name: ${APP_NAME:MyURL API[DEV]}
  jwt:
    secret: ${APP_JWT_SECRET:MyURLSecretKeyForJWTTokenGeneration2024VeryLongSecretKeyForHS512Algorithm}
    expiration-ms: 3600000
  rate-limit:
    login:
      requests: 1000
      seconds: 60
    login-by-username:
      requests: 1000
      seconds: 60
    password-reset:
      requests: 500
      seconds: 60
    password-reset-by-email:
      requests: 1000
      seconds: 60
    otp:
      requests: 1000
      seconds: 60
    otp-by-email:
      requests: 1000
      seconds: 60
    signup:
      requests: 1000
      seconds: 60
    email-verification:
      requests: 100
      seconds: 60
    url-creation:
      requests: 5000
      seconds: 60
    general-api:
      requests: 10000
      seconds: 60
    redirect:
      requests: 50000
      seconds: 60

# Mail Configuration - Uses environment variables
# Set SMTP_USERNAME, SMTP_PASSWORD, SMTP_HOST, SMTP_PORT to use real SMTP
# Or leave unset to use GreenMail (localhost:3025) for testing
spring.mail:
  host: ${SMTP_HOST:localhost}
  port: ${SMTP_PORT:3025}
  username: ${SMTP_USERNAME:test}
  password: ${SMTP_PASSWORD:test}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: ${SMTP_STARTTLS_ENABLED:false}
