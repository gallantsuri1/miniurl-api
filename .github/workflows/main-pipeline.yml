name: Main Pipeline - Build, Test, Docker & Deploy

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - 'SETUP_GUIDE.md'
      - '.github/workflows/pr-validation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Maven Build & Unit Tests
        run: |
          mvn clean test -DskipITs -B --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

  build-and-push-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - identity-service
          - url-service
          - redirect-service
          - feature-service
          - notification-service
          - analytics-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: meta
        run: |
          SHA_TAG="sha-${GITHUB_SHA::8}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${SHA_TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure Kubernetes cluster
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          kubectl config use-context ${{ secrets.KUBE_CONTEXT }}

      - name: Update image tags in K8s manifests
        run: |
          SHA_TAG="sha-${GITHUB_SHA::8}"
          REGISTRY="ghcr.io/${{ github.repository }}"
          for service in api-gateway eureka-server identity-service url-service redirect-service feature-service notification-service analytics-service; do
            sed -i "s|miniurl/${service}:.*|${REGISTRY}/${service}:${SHA_TAG}|g" "k8s/services/${service}.yaml" 2>/dev/null || true
          done

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/infrastructure/
          kubectl wait --for=condition=ready namespace/miniurl --timeout=60s 2>/dev/null || true
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/hpa/

      - name: Verify deployment
        run: |
          for service in api-gateway eureka-server identity-service url-service redirect-service feature-service notification-service analytics-service; do
            kubectl -n miniurl rollout status "deployment/${service}" --timeout=120s || true
          done

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Deployment successful!",
              "blocks": [{
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*MyURL Deployment Successful*\n\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Environment:* Production"
                  }
              }]
            }

      - name: Notify deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Deployment failed!",
              "blocks": [{
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*MyURL Deployment Failed*\n\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Environment:* Production\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build Log>"
                  }
              }]
            }
