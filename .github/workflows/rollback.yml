name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - dev
          - prod
      revision:
        description: 'Revision to rollback to (0 = previous revision)'
        required: false
        type: string
        default: '0'

permissions:
  contents: read
  id-token: write

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment == 'prod' && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          else
            echo "${{ secrets.DEV_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          fi
          chmod 600 $HOME/.kube/config

      - name: Show Helm history
        run: |
          echo "=== Helm Release History ==="
          helm history miniurl -n miniurl --max 10

      - name: Execute rollback
        id: rollback
        run: |
          REV="${{ github.event.inputs.revision }}"
          if [ "$REV" = "0" ]; then
            echo "Rolling back to previous revision..."
            helm rollback miniurl -n miniurl --timeout 5m --wait
          else
            echo "Rolling back to revision ${REV}..."
            helm rollback miniurl "$REV" -n miniurl --timeout 5m --wait
          fi
          NEW_REV=$(helm history miniurl -n miniurl --max 1 -o json | grep -o '"revision":[0-9]*' | head -1 | cut -d: -f2)
          echo "new_revision=${NEW_REV}" >> $GITHUB_OUTPUT
          echo "Rolled back to revision: ${NEW_REV}"

      - name: Verify deployments
        run: |
          for service in api-gateway eureka-server identity-service url-service redirect-service feature-service notification-service analytics-service; do
            echo "Checking ${service}..."
            kubectl -n miniurl rollout status "deployment/${service}" --timeout=120s || true
          done

      - name: Smoke test
        run: |
          INGRESS_HOST="${{ github.event.inputs.environment == 'prod' && 'api.miniurl.com' || 'dev.api.miniurl.com' }}"
          INGRESS_IP=$(kubectl -n miniurl get ingress miniurl-ingress -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          if [ -n "$INGRESS_IP" ]; then
            curl -fsS -H "Host: ${INGRESS_HOST}" "http://${INGRESS_IP}/api/health" || echo "WARN: Health check failed"
          else
            echo "INFO: No ingress IP, skipping smoke test"
          fi

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Rollback successful",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*MiniURL Rollback*\n\n*Environment:* `${{ github.event.inputs.environment }}`\n*New Revision:* `${{ steps.rollback.outputs.new_revision }}`\n*Status:* ✅ Success"
                }
              }]
            }

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Rollback FAILED",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*MiniURL Rollback FAILED*\n\n*Environment:* `${{ github.event.inputs.environment }}`\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build Log>"
                }
              }]
            }
