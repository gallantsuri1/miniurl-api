# Development Docker Compose with hot reload
version: '3.8'

services:
  # MiniURL API (Development with volume mount)
  miniurl-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniurl-api-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://host.docker.internal:3306/miniurldb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-rootpass}

      # JWT Configuration
      APP_JWT_SECRET: ${APP_JWT_SECRET:-MiniURLSecretKeyForJWTTokenGeneration2024VeryLongSecretKeyForHS512Algorithm}
      APP_JWT_EXPIRATION_MS: 3600000

      # SMTP Configuration
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # Application Configuration
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_OTP_EXPIRY_MINUTES: 15

      # Spring Profile - Development (enables Swagger/OpenAPI)
      SPRING_PROFILES_ACTIVE: dev

      # Development settings
      SPRING_THYMELEAF_CACHE: "false"
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

      # JVM Options with debug
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    volumes:
      # Mount source code for hot reload (if using spring-boot-devtools)
      - ./src:/app/src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - miniurl-api-network

networks:
  miniurl-api-network:
    driver: bridge

volumes:
  mysql-data-dev:
    driver: local
