{{- range $name, $svc := .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "miniurl.labels" (dict "name" $name) | nindent 4 }}
spec:
  type: {{ $svc.serviceType | default "ClusterIP" }}
  selector:
    app: {{ $name }}
  ports:
  {{- range $svc.ports }}
  - name: {{ .name }}
    port: {{ .servicePort | default .containerPort }}
    targetPort: {{ .containerPort }}
  {{- end }}
{{- end }}
