# MyURL Test Configuration (H2 In-Memory Database)
# This configuration is loaded when 'test' profile is active

server:
  port: 8080

spring:
  application:
    name: MyURL API-Test

  # H2 In-Memory Database for Testing - MUST override any MySQL config
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    # HikariCP Configuration for Tests
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 10000
      auto-commit: false

  # H2 Console (disabled in tests)
  h2:
    console:
      enabled: false

  # JPA Configuration for H2
  jpa:
    hibernate:
      ddl-auto: create-drop
      use-new-id-generator-mappings: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 10
          fetch_size: 30
    defer-datasource-initialization: true
    open-in-view: false

  # SQL Initialization for Tests
  sql:
    init:
      mode: always
      continue-on-error: false

  # Mail Configuration (GreenMail for testing)
  mail:
    host: localhost
    port: 3025
    username:
    password:
    test-connection: false
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Security - Disable OAuth2 resource server auto-config for custom JWT
  security:
    oauth2:
      resourceserver:
        jwt:
          enabled: false

# JWT Configuration (shorter expiration for tests)
app:
  jwt:
    # Use a test-specific secret that passes validation (not the default)
    secret: TestSecretKeyForJWTTokenGeneration2024VeryLongSecureSecretKeyForHS512AlgorithmTestingPurposes
    expiration-ms: 3600000

  base-url: http://localhost:8080
  otp:
    expiry-minutes: 10
    resend-cooldown-seconds: 0
  name: MyURL API-Test
  rate-limit:
    login:
      requests: 1000
      seconds: 60
    login-by-username:
      requests: 1000
      seconds: 60
    password-reset:
      requests: 500
      seconds: 60
    password-reset-by-email:
      requests: 1000
      seconds: 60
    otp:
      requests: 1000
      seconds: 60
    otp-by-email:
      requests: 1000
      seconds: 60
    signup:
      requests: 1000
      seconds: 60
    url-creation:
      requests: 5000
      seconds: 60
    general-api:
      requests: 10000
      seconds: 60
    redirect:
      requests: 50000
      seconds: 60

# Resilience4j Configuration for Tests (simplified)
resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        waitDurationInOpenState: 5000
        minimumNumberOfCalls: 2
        slidingWindowSize: 10
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      database:
        baseConfig: default
      emailService:
        baseConfig: default
      urlValidation:
        baseConfig: default
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 10
        maxWaitDuration: 5000
    instances:
      urlCreation:
        baseConfig: default
      email:
        baseConfig: default
      admin:
        baseConfig: default
      redirect:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 100
    instances:
      database:
        baseConfig: default
      emailService:
        baseConfig: default
      urlValidation:
        baseConfig: default
  thread-pool-bulkhead:
    configs:
      default:
        coreThreadPoolSize: 5
        maxThreadPoolSize: 10
        keepAliveDuration: 10000
        queueCapacity: 50

# Actuator Configuration for Tests
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    mail:
      enabled: false
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Logging Configuration for Tests
logging:
  level:
    com.miniurl: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # Suppress mail health check warnings in tests
    org.springframework.boot.actuate.mail.MailHealthIndicator: ERROR
    org.eclipse.angus.mail: ERROR
    jakarta.mail: ERROR
    io.github.resilience4j: DEBUG

# Springdoc OpenAPI Configuration (disabled in tests)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
