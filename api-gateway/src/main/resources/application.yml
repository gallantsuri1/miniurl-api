server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Identity Service
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/auth/**, /api/profile/**, /api/admin/users/**, /api/health
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
        
        # URL Service
        - id: url-service
          uri: lb://url-service
          predicates:
            - Path=/api/urls/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
        
        # Redirect Service (Hot Path)
        - id: redirect-service
          uri: lb://redirect-service
          predicates:
            - Path=/r/{code}
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1000
                redis-rate-limiter.burstCapacity: 2000
                key-resolver: "#{@userKeyResolver}"
        
        # Feature Service
        - id: feature-service
          uri: lb://feature-service
          predicates:
            - Path=/api/features/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

  # Redis Configuration for Rate Limiting
  data:
    redis:
      host: ${GATEWAY_REDIS_HOST:localhost}
      port: ${GATEWAY_REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# Security Configuration
# The Gateway will act as an OAuth2 Resource Server, validating JWTs using the Identity Service's JWKS endpoint
spring.security.oauth2.resourceserver.jwt.jwk-set-uri: ${IDENTITY_SERVICE_URL:http://identity-service}/.well-known/jwks.json

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
