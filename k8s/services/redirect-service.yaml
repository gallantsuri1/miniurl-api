apiVersion: apps/v1
kind: Deployment
metadata:
  name: redirect-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redirect-service
  template:
    metadata:
      labels:
        app: redirect-service
    spec:
      containers:
      - name: redirect-service
        image: miniurl/redirect-service:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: global-config
---
apiVersion: v1
kind: Service
metadata:
  name: redirect-service
spec:
  selector:
    app: redirect-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
