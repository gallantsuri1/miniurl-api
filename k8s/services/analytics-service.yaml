apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: miniurl/analytics-service:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: global-config
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-analytics:3306/analytics_db"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: MYSQL_ROOT_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
