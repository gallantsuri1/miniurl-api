# Identity Service Configuration - Production Profile
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.miniurl.identity: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.apache.kafka: WARN

# Ensure actuator endpoints remain exposed in production
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
